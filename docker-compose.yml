services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      DATABASE_URL: postgresql+psycopg2://zakat:zakat@db:5432/zakat
      ENV: development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zakat
      POSTGRES_PASSWORD: zakat
      POSTGRES_DB: zakat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zakat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
