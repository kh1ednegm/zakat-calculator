{% extends "base.html" %}
{% block content %}
<div class="auth-card animate-in">
  <div class="card">
    <div class="auth-header">
      <div class="auth-icon"><i class="bi bi-person-plus"></i></div>
      <h2>إنشاء حساب</h2>
    </div>
    <div class="card-body">
      <form method="post" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
          <label class="form-label">الاسم الكامل</label>
          <input type="text" name="full_name" class="form-control" required minlength="2" maxlength="120" placeholder="محمد أحمد">
        </div>
        <div class="mb-3">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" name="email" class="form-control" required autocomplete="email" placeholder="example@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label">كلمة المرور</label>
          <input type="password" name="password" class="form-control" required minlength="8" autocomplete="new-password" placeholder="8 أحرف على الأقل">
        </div>
        <div class="mb-3">
          <label class="form-label">تأكيد كلمة المرور</label>
          <input type="password" name="password_confirm" class="form-control" required minlength="8" autocomplete="new-password" placeholder="أعد كتابة كلمة المرور">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-person-check"></i> إنشاء الحساب
        </button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted">لديك حساب؟ <a href="/login">سجل دخولك</a></p>
    </div>
  </div>
</div>
{% endblock %}
