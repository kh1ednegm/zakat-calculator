{% extends "base.html" %}
{% block content %}
<div class="auth-card animate-in">
  <div class="card">
    <div class="auth-header">
      <div class="auth-icon"><i class="bi bi-box-arrow-in-left"></i></div>
      <h2>تسجيل الدخول</h2>
    </div>
    <div class="card-body">
      <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" name="email" class="form-control" required autocomplete="email" placeholder="example@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label">كلمة المرور</label>
          <input type="password" name="password" class="form-control" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-left"></i> دخول
        </button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted">ليس لديك حساب؟ <a href="/register">أنشئ حسابًا مجانًا</a></p>
    </div>
  </div>
</div>
{% endblock %}
